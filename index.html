  <style>
    :root{
      --paper:#f7f3ec;
      --ink:#2b2622;--muted:#7a6a58;--gold:#b3915f;
      --serif:'Cormorant Garamond',Georgia,serif;
      --display:'Italiana',Georgia,serif;
    }
    *{box-sizing:border-box}

    /* warm walnut backdrop so the page blends into the photo's wooden edges */
    body{
      margin:0;color:var(--ink);font-family:var(--serif);
      background:
        radial-gradient(120% 60% at 50% 0%,rgba(150,104,64,.28),transparent 60%),
        radial-gradient(90% 50% at 12% 78%,rgba(196,160,116,.16),transparent 65%),
        radial-gradient(90% 50% at 88% 92%,rgba(196,160,116,.13),transparent 65%),
        repeating-linear-gradient(96deg,rgba(0,0,0,.05) 0 2px,transparent 2px 7px),
        linear-gradient(#4a3423,#33241a);
      -webkit-font-smoothing:antialiased;
      /* the invitation fits the screen — nothing ever scrolls */
      height:100dvh;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }

    /* keeps the <img> itself as the flex child, not the <picture> wrapper */
    picture{display:contents}

    /* full width, no side cropping, centred vertically.
       max-height keeps wide/landscape screens from blowing it up. */
    .invitation{
      display:block;width:100%;height:auto;flex:none;
      max-height:100dvh;object-fit:contain;
    }

    /* buttons float over the photo, so the image keeps the full height */
    .footer{
      position:fixed;left:0;right:0;bottom:0;z-index:10;
      padding:70px 16px max(18px,env(safe-area-inset-bottom));
      background:linear-gradient(transparent,rgba(30,19,11,.34) 50%,rgba(24,15,8,.6));
      pointer-events:none;
    }


    .actions{
      display:flex;justify-content:center;flex-wrap:wrap;gap:10px;
      pointer-events:auto;
    }

    /* small frosted-glass pills */
    .actions a{
      position:relative;
      display:inline-flex;align-items:center;justify-content:center;gap:9px;
      min-height:50px;padding:0 24px;
      text-decoration:none;color:#fff;white-space:nowrap;
      /* readable text weight/size — a hairline display face fell apart here */
      font-family:var(--serif);font-weight:600;font-size:18px;
      letter-spacing:.03em;
      border-radius:999px;
      /* darker glass so light text keeps contrast over the photo */
      background:rgba(38,25,15,.42);
      -webkit-backdrop-filter:blur(16px) saturate(1.4);
      backdrop-filter:blur(16px) saturate(1.4);
      border:0;
      box-shadow:
        0 10px 26px rgba(10,6,2,.36),
        0 1px 0 rgba(255,255,255,.28) inset;
      text-shadow:0 1px 4px rgba(0,0,0,.55);
      transition:transform .22s cubic-bezier(.2,.7,.3,1),background .22s ease,border-color .22s ease;
    }
    /* soft gold glow so the pills catch the eye against the photo */
    .actions a::after{
      content:"";position:absolute;inset:-1px;border-radius:inherit;pointer-events:none;
      background:linear-gradient(160deg,rgba(255,255,255,.28),transparent 55%);
    }
    .actions a:hover,.actions a:focus-visible{
      transform:translateY(-2px);outline:0;
      background:rgba(38,25,15,.58);
    }
    .actions a:active{transform:translateY(0) scale(.97)}

    .actions svg.ico{width:19px;height:19px;flex:none;fill:none;stroke:#eccf95;
      stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}


    /* narrow phones: keep both pills on one row */
    @media(max-width:360px){
      .actions{gap:8px}
      .actions a{font-size:15px;padding:0 14px;min-height:46px;gap:7px}
      .actions svg.ico{width:17px;height:17px}
    }

    @media(max-height:620px){
      .footer{padding-top:50px}
      .actions a{min-height:44px;padding:0 18px;font-size:16px}
    }

    @media(prefers-reduced-motion:reduce){*{transition:none!important}}
  </style>
